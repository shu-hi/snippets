version: '3.8'
services:
  fastapi:
    build: .
    container_name: fastapi
    expose:
      - "5000"
    networks:
      - nest-network
    volumes:
      - ./api:/app  # ← 開発用、ビルドなし反映用
  nginx:
        image: nginx:latest
        container_name: nginx-fastapi
        ports:
          - "80:80"
        networks:
        - nest-network
        volumes:
          - ./nginx.conf:/etc/nginx/conf.d/default.conf
        depends_on:
          - fastapi
networks:
  nest-network:
    external: true